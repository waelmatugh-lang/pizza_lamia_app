<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pizza Lamia 🍕">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Pizza Lamia 🍕</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div id="loading-box"
    style="background-color: #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
    <div style="font-size: 80px; margin-bottom: 20px; animation: pulse 1s infinite;">🍕</div>
    <h2 style="color: #ff4500; font-family: sans-serif;">جاري تحضير البيتزا...</h2>
    <p style="color: #fff; font-family: sans-serif; font-size: 14px;">التحميل لأول مرة قد يستغرق بعض الوقت</p>
  </div>

  <style>
    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>

  <script>
    // هذا الكود يستمع لـ فلاتر، وبمجرد أن يجهز التطبيق سيقوم بإخفاء البيتزا النابضة
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading-box').style.display = 'none';
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
